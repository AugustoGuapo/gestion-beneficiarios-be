name: CI - Lint & Test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint:
    name: 🔍 Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: 🔍 Run ruff linter
        run: ruff check app/ tests/

      - name: 🔍 Run ruff formatter check
        run: ruff format --check app/ tests/

  test:
    name: 🧪 Tests
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: root
          POSTGRES_DB: gestion_beneficiarios_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: 🗄️ Initialize test database
        run: PGPASSWORD=root psql -h localhost -U root -d gestion_beneficiarios_test -f scripts/init.sql
        env:
          PGPASSWORD: root

      - name: 🧪 Run tests
        run: python -m pytest tests/ -v --tb=short --maxfail=3
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: gestion_beneficiarios_test
          JWT_SECRET_KEY: test-secret-key-not-for-production
          JWT_ALGORITHM: HS256
          JWT_EXPIRATION_MINUTES: 60

      - name: 📊 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/