services:
  api:
    build: .

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      DB_HOST: db

    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16

    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: gestion_beneficiarios

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Solo el esquema base. Montar ./scripts entero ejecutaba otros .sql/.sh
      # en orden alfabético antes que init.sql y abortaba el bootstrap (sin tabla recurso).
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/00_init_schema.sql
      - ./migrations:/migrations

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d gestion_beneficiarios"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
